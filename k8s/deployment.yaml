apiVersion: apps/v1
kind: Deployment
metadata:
  name: organization-service
  labels:
    app: organization-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: organization-service
  template:
    metadata:
      labels:
        app: organization-service
    spec:
      containers:
        - name: organization-service
          image: ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
          ports:
            - containerPort: 3002
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3002"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: org-db
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: org-db
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: org-db
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: org-db
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: org-db
                  key: name
            - name: CORS_ORIGIN
              value: "https://tudominio.com"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
